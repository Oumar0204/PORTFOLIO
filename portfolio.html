<!doctype html>
<html lang="fr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Portfolio — Accueil</title>

  <style>
    :root{
      --bg:#081221;
      --name-color:#f5f7ff;
      font-family: Inter, ui-sans-serif, system-ui;
      --crystal-size: 80px;
    }

    #bg-video{
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -1;
    }

    html,body{
      height:100%;
      margin:0;
      color:var(--name-color);
      display:grid;
      place-items:center;
      overflow:hidden;
    }

    .stage{
      position:relative;
      width:90vw;
      height:80vh;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    h1{
      font-size:clamp(36px,6vw,80px);
      margin:0;
      z-index:5;
      text-align:center;
    }

    h2{
      margin:0;
      text-align:center;
      font-weight:500;
    }

    .crystals-layer{
      position:absolute;
      inset:0;
      pointer-events:none;
    }

    .crystal-link{
      position:absolute;
      width:var(--crystal-size);
      height:var(--crystal-size);
      pointer-events:auto;
      text-decoration:none;
    }

    /* Conteneur 3D du cristal */
    .crystal-3d{
      width:100%;
      height:100%;
      position:relative;
      transform-style:preserve-3d;
      transition:transform .4s, filter .4s;
    }

    .crystal-link:hover .crystal-3d,
    .crystal-link:focus .crystal-3d,
    .crystal-link:focus-visible .crystal-3d{
      transform:rotateX(18deg) rotateY(22deg) scale(1.1);
      filter:drop-shadow(0 0 12px rgba(255,255,255,0.35));
    }

    /* Faces du cristal */
    .facet3d{
      position:absolute;
      width:100%;
      height:100%;
      background:linear-gradient(180deg,rgba(255,255,255,.2),rgba(0,0,0,.25));
      border:1px solid rgba(255,255,255,.2);
    }

    /* Formes */
    .shapeA .facet3d:nth-child(1){ transform:rotateY(0deg) translateZ(40px); }
    .shapeA .facet3d:nth-child(2){ transform:rotateY(90deg) translateZ(40px); }
    .shapeA .facet3d:nth-child(3){ transform:rotateY(180deg) translateZ(40px); }
    .shapeA .facet3d:nth-child(4){ transform:rotateY(270deg) translateZ(40px); }

    .shapeB .facet3d:nth-child(1){ transform:rotateX(0deg) translateZ(40px); }
    .shapeB .facet3d:nth-child(2){ transform:rotateX(90deg) translateZ(40px); }
    .shapeB .facet3d:nth-child(3){ transform:rotateX(180deg) translateZ(40px); }
    .shapeB .facet3d:nth-child(4){ transform:rotateX(270deg) translateZ(40px); }

    .shapeC .facet3d:nth-child(1){ transform:rotateY(0deg) rotateX(45deg) translateZ(35px); }
    .shapeC .facet3d:nth-child(2){ transform:rotateY(120deg) rotateX(45deg) translateZ(35px); }
    .shapeC .facet3d:nth-child(3){ transform:rotateY(240deg) rotateX(45deg) translateZ(35px); }
	
	/* Forme D - pyramide pointue */
.shapeD .facet3d:nth-child(1){ transform:rotateY(0deg) rotateX(60deg) translateZ(35px); }
.shapeD .facet3d:nth-child(2){ transform:rotateY(90deg) rotateX(60deg) translateZ(35px); }
.shapeD .facet3d:nth-child(3){ transform:rotateY(180deg) rotateX(60deg) translateZ(35px); }
.shapeD .facet3d:nth-child(4){ transform:rotateY(270deg) rotateX(60deg) translateZ(35px); }

/* Forme E - losange 3D */
.shapeE .facet3d:nth-child(1){ transform:rotateX(45deg) translateZ(40px); }
.shapeE .facet3d:nth-child(2){ transform:rotateX(-45deg) translateZ(40px); }
.shapeE .facet3d:nth-child(3){ transform:rotateY(45deg) translateZ(40px); }
.shapeE .facet3d:nth-child(4){ transform:rotateY(-45deg) translateZ(40px); }

/* Forme F - étoile (irrégulière) */
.shapeF .facet3d:nth-child(1){ transform:rotateY(0deg) rotateX(30deg) translateZ(40px); }
.shapeF .facet3d:nth-child(2){ transform:rotateY(72deg) rotateX(30deg) translateZ(40px); }
.shapeF .facet3d:nth-child(3){ transform:rotateY(144deg) rotateX(30deg) translateZ(40px); }
.shapeF .facet3d:nth-child(4){ transform:rotateY(216deg) rotateX(30deg) translateZ(40px); }
.shapeF .facet3d:nth-child(5){ transform:rotateY(288deg) rotateX(30deg) translateZ(40px); }

    /* Couleurs */
    .color1 .facet3d{ background:linear-gradient(160deg,#7ee7ff,#003b66); }
    .color2 .facet3d{ background:linear-gradient(160deg,#9b7eff,#2a1166); }
    .color3 .facet3d{ background:linear-gradient(160deg,#6affb3,#0c6644); }
    .color4 .facet3d{ background:linear-gradient(160deg,#ff6ad5,#5c003f); }
    .color5 .facet3d{ background:linear-gradient(160deg,#ffd36a,#664700); }
    .color6 .facet3d{ background:linear-gradient(160deg,#ff8f6a,#662400); }

    /* Label toujours visible */
    .crystal-label{
      position:absolute;
      left:50%;
      top:120%;
      transform:translateX(-50%);
      padding:8px 14px;
      background:rgba(10,15,30,0.82);
      backdrop-filter:blur(6px);
      border-radius:12px;
      font-size:14px;
      letter-spacing:0.5px;
      opacity:1;
      pointer-events:none;
      white-space:nowrap;
      color:#ffffff;
      box-shadow:0 0 10px rgba(0,0,0,0.35);
      transition:transform .35s ease, box-shadow .35s ease, background .35s ease;
    }

    .crystal-link:hover .crystal-label,
    .crystal-link:focus .crystal-label,
    .crystal-link:focus-visible .crystal-label{
      transform:translateX(-50%) translateY(8px) scale(1.05);
      background:rgba(10,15,30,0.95);
      box-shadow:0 0 16px rgba(130,255,210,0.28);
    }

    .crystal-link:focus,
    .crystal-link:focus-visible{
      outline:none;
    }

    @keyframes float3D{
      0%{ transform: translateY(0) rotateY(0deg); }
      50%{ transform: translateY(-20px) rotateY(18deg); }
      100%{ transform: translateY(0) rotateY(0deg); }
    }

    .float{
      animation:float3D 6s ease-in-out infinite;
    }

    .welcome-block{
      position:relative;
      z-index:5;
      margin-top:-20px;
    }
  </style>
</head>
<body>

  <video autoplay muted loop playsinline id="bg-video">
    <source src="galaxy.mp4" type="video/mp4">
  </video>

  <div class="stage" role="main">
    <h1><span class="accent">Oumar Ahne</span></h1>
    <div class="crystals-layer" aria-hidden="false"></div>
  </div>

  <div class="welcome-block">
    <h2><span class="accent">Bienvenue sur mon portfolio</span></h2>
  </div>

  <script>
  const crystals = [
    {label:'Profile', href:'profil.html', shape:'shapeA', color:'color1'},
    {label:'Formation', href:'formation.html', shape:'shapeB', color:'color2'},
    {label:'Epreuve E5', href:'E5.html', shape:'shapeC', color:'color3'},
    {label:'Veille Technologique', href:'veille.html', shape:'shapeD', color:'color4'},
    {label:'Contact', href:'contact.html', shape:'shapeE', color:'color5'},
    {label:'Parcours', href:'parcours.html', shape:'shapeF', color:'color6'}
  ];

  const layer = document.querySelector('.crystals-layer');
  const stage = document.querySelector('.stage');

  function getFacesCount(shape){
    switch(shape){
      case 'shapeC':
        return 3;
      case 'shapeF':
        return 5;
      default:
        return 4;
    }
  }

  function placeCrystals(){
    layer.innerHTML = '';

    const rect = stage.getBoundingClientRect();
    const cx = rect.width / 2;
    const cy = rect.height / 2;

    const size = parseInt(
      getComputedStyle(document.documentElement).getPropertyValue('--crystal-size')
    ) || 80;

    const radius = Math.min(rect.width, rect.height) * 0.5;

    crystals.forEach((c, i) => {
      const angle = (i / crystals.length) * Math.PI * 2 - Math.PI / 2;

      const x = cx + Math.cos(angle) * radius - size / 2;
      const y = cy + Math.sin(angle) * radius - size / 2;

      const aEl = document.createElement('a');
      aEl.className = 'crystal-link';
      aEl.style.left = `${x}px`;
      aEl.style.top = `${y}px`;
      aEl.href = c.href;
      aEl.setAttribute('aria-label', c.label);

      const facesCount = getFacesCount(c.shape);
      let facets = '';

      for(let j = 0; j < facesCount; j++){
        facets += `<div class="facet3d"></div>`;
      }

      aEl.innerHTML = `
        <div class="crystal-3d ${c.shape} ${c.color} float">
          ${facets}
        </div>
        <div class="crystal-label">${c.label}</div>
      `;

      layer.appendChild(aEl);
    });
  }

  placeCrystals();

  let rTimer;
  window.addEventListener('resize', () => {
    clearTimeout(rTimer);
    rTimer = setTimeout(() => {
      placeCrystals();
    }, 120);
  });

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Tab') document.body.classList.add('show-focus');
  });
</script>
</body>
</html>
